name: matrix workflow

on: 
 workflow_dispatch: 
 push: 
    branches:
         - main
         - 'feature/*'

jobs: 
 unit-testing: 
   name: ${{ matrix.operating_system }}
   strategy: 
    matrix: 
        nodejs_version: [18,19,20]
        operating_system: [ubuntu-latest,windows-latest]
        exclude: 
            - nodejs_version: 18
              operating_system: windows-latest
   runs-on: ${{ matrix.operating_system}}  
   steps: 
        - name: checkout repositry
          uses: actions/checkout@v4
        - name: setup nodejs version -28 
          uses: actions/setup-node@v4
          with: 
            node-version: ${{ matrix.nodejs_version}} 
        - name: install dependencies
          run: npm install
            
 code-coverage:
    name: code coverage
    runs-on: ubuntu-latest
    steps:
        - name: checkout repository
          uses: actions/checkout@v4
        - name: setups nodejs verson-18
          uses: actions/setup-node@v4
          with:
             node-version: 18 
        - name: install dependciest
          run: npm install 
        - name: check code coverage 
          run: npm run coverage
        - name: archive test result 
          uses: actions/upload-artifact@v4
          with: 
            name: code coverage result 
            path: coverage
            retention-days: 5
                